name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build packages
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o dist/eval-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/eval-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/eval-windows-amd64.exe .

          cd dist
          tar -czf myapp-linux-amd64.tar.gz eval-linux-amd64
          tar -czf myapp-darwin-arm64.tar.gz eval-darwin-arm64
          zip eval-windows-amd64.zip eval-windows-amd64.exe

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
